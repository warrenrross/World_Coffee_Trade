<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Global Coffee Trade Flows</title>
<link rel="stylesheet" href="styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
</head>
<body>
<div id="app">

<header>
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none" aria-label="logo">
      <circle cx="13" cy="13" r="12" stroke="#d4a144" stroke-width="1.4"/>
      <ellipse cx="13" cy="10" rx="6" ry="2.5" fill="#d4a144" opacity=".9"/>
      <ellipse cx="13" cy="13" rx="8" ry="2.5" fill="#d4a144" opacity=".55"/>
      <ellipse cx="13" cy="16" rx="6" ry="2.5" fill="#d4a144" opacity=".28"/>
    </svg>
    Global Coffee Trade Flows
  </div>
  <span class="badge">BACI · HS92 · 1995–2024</span>
  <a class="badge" href="https://github.com/warrenrross/World_Coffee_Trade" target="_blank" style="text-decoration:none;cursor:pointer">link to repo</a>
  <div class="hdr-right">
    <button id="btn-fullscreen" class="ctrl-btn" title="Fullscreen" aria-label="Toggle fullscreen">
      <svg class="ico-expand" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 5V1h4M9 1h4v4M13 9v4H9M5 13H1V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg class="ico-collapse" width="14" height="14" viewBox="0 0 14 14" fill="none" style="display:none">
        <path d="M5 1v4H1M13 5H9V1M9 13v-4h4M1 9h4v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <a class="src" href="https://www.cepii.fr/CEPII/en/bdd_modele/bdd_modele_item.asp?id=37" target="_blank">Source: CEPII BACI v202601</a>
  </div>
</header>

<div id="map-wrap">
  <div id="loading"><div class="spinner"></div><span class="load-txt">Loading…</span></div>
  <svg id="map-svg">
    <defs>
      <!-- Arrowhead markers at multiple sizes/colors -->
      <marker id="arr-sm" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L6,3 z" fill="#d4a144" opacity=".7"/>
      </marker>
      <marker id="arr-md" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,5 L5,2.5 z" fill="#d4a144" opacity=".85"/>
      </marker>
      <marker id="arr-lg" markerWidth="4" markerHeight="4" refX="3" refY="2" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,4 L4,2 z" fill="#f0c060" opacity=".95"/>
      </marker>
      <marker id="arr-hi" markerWidth="4" markerHeight="4" refX="3" refY="2" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,4 L4,2 z" fill="#ffffff"/>
      </marker>
    </defs>
  </svg>
  <div id="tip"></div>

  <div id="panel">
    <div class="panel-head">
      <div>
        <div class="panel-year" id="panel-year">2023</div>
        <div class="panel-sub">Top trade flows</div>
      </div>
      <button id="panel-toggle" class="ctrl-btn" title="Toggle flow list" aria-label="Toggle flow list">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="2"  width="12" height="1.5" rx=".75" fill="currentColor"/>
          <rect x="1" y="6"  width="12" height="1.5" rx=".75" fill="currentColor"/>
          <rect x="1" y="10" width="12" height="1.5" rx=".75" fill="currentColor"/>
        </svg>
      </button>
    </div>
    <ul class="flow-list" id="flow-list"></ul>
  </div>

  <div id="legend">
    <div class="leg-title">Net trade position</div>
    <div class="leg-net-row">
      <canvas class="leg-grad" id="leg-net-canvas" height="7"></canvas>
    </div>
    <div class="leg-labels" id="leg-net-labels">
      <span id="leg-net-min">Importer</span>
      <span>Neutral</span>
      <span id="leg-net-max">Exporter</span>
    </div>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btn-prev" title="Previous year" aria-label="Previous year">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button class="ctrl-btn" id="btn-play" title="Play" aria-label="Play">
    <svg id="ico-play" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l6 4-6 4V3z" fill="currentColor"/></svg>
    <svg id="ico-pause" width="14" height="14" viewBox="0 0 14 14" fill="none" style="display:none"><rect x="3" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="8" y="2" width="3" height="10" rx="1" fill="currentColor"/></svg>
  </button>
  <button class="ctrl-btn" id="btn-next" title="Next year" aria-label="Next year">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <input type="range" id="year-slider" min="0" step="1"/>
  <span class="yr-lbl" id="yr-lbl">2023</span>

  <div class="divv" id="divv-speed"></div>

  <div class="seg" id="speed-seg">
    <button class="seg-btn on-amber" data-spd="1200">1×</button>
    <button class="seg-btn" data-spd="700">1.5×</button>
    <button class="seg-btn" data-spd="400">3×</button>
  </div>

  <div class="divv" id="divv-flow"></div>

  <div class="seg" id="flow-seg">
    <button class="seg-btn on-amber" id="flow-all">All flows</button>
    <button class="seg-btn" id="flow-top10">Top 10</button>
  </div>
</div>

</div><!-- #app -->

<script src="app.js"></script>
</body>
</html>
