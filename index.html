<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Global Coffee Trade Flows</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;
  --green:#3fb950;--blue:#58a6ff;--amber:#d4a144;
  --font:'Inter',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
#app{display:grid;grid-template-rows:52px 1fr 68px;height:100vh}

/* Header */
header{display:flex;align-items:center;gap:12px;padding:0 18px;
  border-bottom:1px solid var(--border);background:var(--surface);z-index:10}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;
  letter-spacing:-.01em;color:var(--text)}
.badge{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  padding:2px 7px;border-radius:4px;background:rgba(212,161,68,.15);color:var(--amber);
  border:1px solid rgba(212,161,68,.3)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.src{font-size:11px;color:var(--muted);text-decoration:none}
.src:hover{color:var(--text)}

/* Map */
#map-wrap{position:relative;overflow:hidden}
#map-svg{width:100%;height:100%;display:block;cursor:crosshair}
.country{stroke:#21262d;stroke-width:.35px;transition:stroke .15s,stroke-width .15s}
.country:hover{stroke:#fff;stroke-width:1px}
.country.dimmed{opacity:.35}
.flow-arc{fill:none;cursor:pointer}
.flow-arc:hover{filter:brightness(1.6)}
.arc-arrow{pointer-events:none}

/* Side panel */
#panel{position:absolute;top:10px;right:10px;width:236px;
  background:rgba(22,27,34,.94);border:1px solid var(--border);
  border-radius:10px;backdrop-filter:blur(14px);overflow:hidden;z-index:5}
.panel-head{padding:11px 13px 7px;border-bottom:1px solid var(--border)}
.panel-year{font-size:30px;font-weight:800;letter-spacing:-.04em;color:var(--amber);line-height:1}
.panel-sub{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--muted);margin-top:3px}
.flow-list{list-style:none;max-height:330px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.flow-item{display:flex;flex-direction:column;gap:2px;padding:6px 13px;
  border-bottom:1px solid rgba(48,54,61,.5);cursor:pointer;transition:background .12s}
.flow-item:hover,.flow-item.active{background:rgba(212,161,68,.08)}
.flow-route{font-size:11.5px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.flow-bar-row{display:flex;align-items:center;gap:6px}
.bar-bg{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:var(--amber);border-radius:2px;transition:width .35s}
.flow-val{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;
  flex-shrink:0;min-width:46px;text-align:right}

/* Tooltip */
#tip{position:absolute;pointer-events:none;background:rgba(22,27,34,.97);
  border:1px solid var(--border);border-radius:8px;padding:10px 13px;
  font-size:12px;line-height:1.6;z-index:30;display:none;
  backdrop-filter:blur(10px);max-width:230px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
#tip .tip-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px}
#tip .tip-row{display:flex;justify-content:space-between;gap:12px}
#tip .tip-label{color:var(--muted)}
#tip .tip-val{font-weight:600;font-variant-numeric:tabular-nums}
#tip .tip-net-pos{color:var(--green)}
#tip .tip-net-neg{color:var(--blue)}

/* Legend */
#legend{position:absolute;bottom:14px;left:14px;
  background:rgba(22,27,34,.9);border:1px solid var(--border);
  border-radius:8px;padding:9px 13px;font-size:11px;z-index:5;
  backdrop-filter:blur(10px);display:flex;flex-direction:column;gap:6px}
.leg-title{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.leg-grad-row{display:flex;align-items:center;gap:8px}
.leg-grad{width:110px;height:7px;border-radius:3px}
.leg-labels{display:flex;justify-content:space-between;color:var(--muted);
  font-size:9px;font-variant-numeric:tabular-nums;width:110px}
.leg-arc-row{display:flex;align-items:center;gap:7px;color:var(--muted)}
.leg-line{width:26px;height:2px;background:linear-gradient(to right,rgba(212,161,68,.2),var(--amber));border-radius:1px}
.leg-arrow{font-size:10px;color:var(--amber)}
.leg-divider{height:1px;background:var(--border);margin:1px 0}
.leg-net-row{display:flex;align-items:center;gap:8px}
.leg-net-swatch{width:14px;height:14px;border-radius:3px}

/* Controls */
#controls{display:flex;align-items:center;gap:12px;padding:0 18px;
  background:var(--surface);border-top:1px solid var(--border);z-index:10}
.ctrl-btn{display:flex;align-items:center;justify-content:center;
  width:32px;height:32px;border:1px solid var(--border);border-radius:7px;
  background:transparent;color:var(--text);cursor:pointer;transition:all .12s;flex-shrink:0}
.ctrl-btn:hover{background:rgba(255,255,255,.06);border-color:var(--amber)}
.ctrl-btn:active{background:rgba(212,161,68,.15)}
#year-slider{flex:1;-webkit-appearance:none;appearance:none;height:3px;
  border-radius:2px;background:var(--border);outline:none;cursor:pointer}
#year-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--amber);border:2px solid var(--bg);cursor:pointer;
  box-shadow:0 0 0 3px rgba(212,161,68,.2)}
#year-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;
  background:var(--amber);border:2px solid var(--bg);cursor:pointer}
.yr-lbl{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;
  color:var(--text);min-width:34px;text-align:center}
.seg{display:flex;gap:3px}
.seg-btn{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  padding:4px 9px;border:1px solid var(--border);border-radius:5px;
  background:transparent;color:var(--muted);cursor:pointer;transition:all .12s}
.seg-btn.on-green{background:rgba(63,185,80,.15);color:var(--green);border-color:var(--green)}
.seg-btn.on-blue{background:rgba(88,166,255,.15);color:var(--blue);border-color:var(--blue)}
.seg-btn.on-amber{background:rgba(212,161,68,.15);color:var(--amber);border-color:var(--amber)}
.divv{width:1px;height:22px;background:var(--border);flex-shrink:0}

/* Loading */
#loading{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;z-index:99;transition:opacity .5s}
.spinner{width:32px;height:32px;border:3px solid rgba(212,161,68,.2);
  border-top-color:var(--amber);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:12px;color:var(--muted)}
</style>
</head>

  <div class="divv"></div>

  <div class="seg" id="speed-seg">

    <button class="seg-btn" data-spd="400">3×</button>
  </div>

  <div class="divv"></div>

  <div class="seg" id="flow-seg">
    <button class="seg-btn on-amber" id="flow-all">All flows</button>
    <button class="seg-btn" id="flow-top10">Top 10</button>
  </div>
</div>

</div><!-- #app -->

// ── Color scales ───────────────────────────────────────────────────────────
// ±$1M = neutral grey. Beyond that, log-scale so small traders still get color.
// Log scale compresses Brazil's $11B dominance and spreads the middle range.
const NEUTRAL_BAND = 1; // $1M in millions
const NEUTRAL_COLOR = '#cdd1d9'; // light blue-grey
const netColorScale = (net, maxAbs) => {
  const absNet = Math.abs(net);
  if (absNet <= NEUTRAL_BAND) return NEUTRAL_COLOR;
  // Log-scale t: 0 = just above neutral, 1 = maxAbs
  const t = Math.min(
    Math.log(absNet / NEUTRAL_BAND) / Math.log(Math.max(maxAbs / NEUTRAL_BAND, 2)),
    1
  );
  if (net > 0) {
    return d3.interpolate(NEUTRAL_COLOR, '#2da44e')(t);
  } else {
    return d3.interpolate(NEUTRAL_COLOR, '#3b82f6')(t);
  }
};

// ── Main render ────────────────────────────────────────────────────────────
function render() {
  const year = years[yi];
  const yd = TRADE[year];
  if (!yd) return;

  document.getElementById('panel-year').textContent = year;
  document.getElementById('yr-lbl').textContent = year;
  document.getElementById('year-slider').value = yi;

  // Compute maxAbs net for this year (for color scale)
  const netVals = Object.values(yd.countries).map(d => Math.abs(d.net));
  const maxAbs = d3.max(netVals) || 1;

  // Choropleth — net exporter green, net importer blue
  // Only update fill colors; never touch .dimmed here (that's hover-only)
  gCountries.selectAll('.country')
    .attr('fill', d => {
      const iso = isoFromNum[+d.id];
      const c = iso && yd.countries[iso];
      if (!c) return '#2d333b';  // no data: dark grey
      return netColorScale(c.net, maxAbs);
    })
    .classed('dimmed', false);  // always clear dimming on a real render

  // Legend gradient
  drawLegendGradient(maxAbs);

  // Flows
  const flows = topNFilter === 40 ? yd.flows : yd.flows.slice(0, topNFilter);
  drawFlows(flows);

  // Panel
  updatePanel(yd.flows.slice(0, 30));
}

// ── Legend gradient ────────────────────────────────────────────────────────
function drawLegendGradient(maxAbs) {
  const canvas = document.getElementById('leg-net-canvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  // Left = max importer, center = neutral, right = max exporter
  for (let i = 0; i < w; i++) {
    const t = i / (w - 1);              // 0 (left/blue) → 1 (right/green)
    const net = (t - 0.5) * 2 * maxAbs; // -maxAbs … +maxAbs
    ctx.fillStyle = netColorScale(net, maxAbs);
    ctx.fillRect(i, 0, 1, 7);
  }
  const fmt = v => v >= 1000 ? (v/1000).toFixed(1)+'B' : v.toFixed(0)+'M';
  document.getElementById('leg-net-min').textContent = `-$${fmt(maxAbs)}`;
  document.getElementById('leg-net-max').textContent = `+$${fmt(maxAbs)}`;
}

// ── Flow arcs ──────────────────────────────────────────────────────────────
function drawFlows(flows) {
  gFlows.selectAll('*').remove();

  const maxV = d3.max(flows, d => d.v) || 1;
  const wScale   = d3.scaleSqrt().domain([0, maxV]).range([0.5, 5]).clamp(true);
  const opScale  = d3.scaleLinear().domain([0, maxV]).range([0.12, 0.72]).clamp(true);

  flows.forEach((d, i) => {
    const src = centroidMap[d.ei];
    const tgt = centroidMap[d.ii];
    if (!src || !tgt) return;

    const isHi = highlighted && d.ei === highlighted.ei && d.ii === highlighted.ii;
    const sw   = wScale(d.v);
    const op   = highlighted ? (isHi ? 0.92 : 0.06) : opScale(d.v);

    // Bend arc away from straight line
    const dx = tgt[0] - src[0], dy = tgt[1] - src[1];
    const dist = Math.sqrt(dx*dx + dy*dy);
    const bend = dist * 0.22;
    const mx = (src[0]+tgt[0])/2 - dy * bend / (dist||1);
    const my = (src[1]+tgt[1])/2 + dx * bend / (dist||1);

    // Shorten endpoint slightly so arrow doesn't overdraw the country
    const t = 0.88;
    const ex = (1-t)*(1-t)*src[0] + 2*(1-t)*t*mx + t*t*tgt[0];
    const ey = (1-t)*(1-t)*src[1] + 2*(1-t)*t*my + t*t*tgt[1];
    const arcD = `M ${src[0]},${src[1]} Q ${mx},${my} ${ex},${ey}`;

    // Choose marker size
    const marker = sw > 3.5 ? 'arr-lg' : sw > 1.8 ? 'arr-md' : 'arr-sm';

    const path = gFlows.append('path')
      .attr('class','flow-arc')
      .attr('d', arcD)
      .attr('stroke', isHi ? '#ffffff' : '#d4a144')
      .attr('stroke-width', sw)
      .attr('stroke-opacity', 0)
      .attr('marker-end', `url(#${isHi ? 'arr-hi' : marker})`)
      // Store base values so onCountryLeave can restore without a redraw
      .attr('data-base-op', op)
      .attr('data-base-marker', `url(#${isHi ? 'arr-hi' : marker})`)
      .datum(d);

    path.transition()
      .delay(i * 15).duration(450).ease(d3.easeCubicOut)
      .attr('stroke-opacity', op);

    // Hover
    path.on('mousemove', (event) => {
      showFlowTip(event, d);
    }).on('mouseleave', () => {
      hideTip();
    }).on('click', () => {
      highlighted = (highlighted && highlighted.ei===d.ei && highlighted.ii===d.ii)
        ? null : { ei: d.ei, ii: d.ii };
      render();
    });
  });
}

// ── Country hover — tooltip + arc highlight + bigFlow overlay ────────────────
// bigFlows: all flows >$100M for this country, drawn as supplemental arcs
// Regular top-40 arcs are updated in-place (no redraw).
// Supplemental arcs (.flow-arc-hover) are appended and removed on leave.
function onCountryHover(event, d) {
  const iso = isoFromNum[+d.id];
  const year = years[yi];
  const yd = TRADE[year];
  if (!yd || !iso) return;

  // Dim all countries except hovered one
  gCountries.selectAll('.country')
    .classed('dimmed', dd => isoFromNum[+dd.id] !== iso);

  // Set of exporter+importer pairs already drawn in top-40
  const drawnPairs = new Set();
  gFlows.selectAll('.flow-arc').each(function(fd) {
    drawnPairs.add(fd.ei + '|' + fd.ii);
  });

  // Dim all existing top-40 arcs; highlight ones connected to this country
  gFlows.selectAll('.flow-arc').each(function(fd) {
    const connected = fd.ei === iso || fd.ii === iso;
    const el = d3.select(this);
    el.attr('stroke', connected ? '#ffffff' : '#d4a144')
      .attr('stroke-opacity', connected ? 0.92 : 0.05)
      .attr('marker-end', connected
        ? 'url(#arr-hi)'
        : `url(#${+el.attr('stroke-width') > 3.5 ? 'arr-lg' : +el.attr('stroke-width') > 1.8 ? 'arr-md' : 'arr-sm'})`
      );
  });

  // Draw supplemental arcs for bigFlows not already in top-40
  const bigFlows = (yd.bigFlows || []).filter(f =>
    (f.ei === iso || f.ii === iso) && !drawnPairs.has(f.ei + '|' + f.ii)
  );

  const maxV = d3.max(yd.flows, f => f.v) || 1;
  const wScale = d3.scaleSqrt().domain([0, maxV]).range([0.5, 5]).clamp(true);

  bigFlows.forEach(f => {
    const src = centroidMap[f.ei];
    const tgt = centroidMap[f.ii];
    if (!src || !tgt) return;
    const sw = wScale(f.v);
    const dx = tgt[0]-src[0], dy = tgt[1]-src[1];
    const dist = Math.sqrt(dx*dx+dy*dy);
    const bend = dist * 0.22;
    const mx = (src[0]+tgt[0])/2 - dy*bend/(dist||1);
    const my = (src[1]+tgt[1])/2 + dx*bend/(dist||1);
    const t = 0.88;
    const ex = (1-t)*(1-t)*src[0] + 2*(1-t)*t*mx + t*t*tgt[0];
    const ey = (1-t)*(1-t)*src[1] + 2*(1-t)*t*my + t*t*tgt[1];
    const arcD = `M ${src[0]},${src[1]} Q ${mx},${my} ${ex},${ey}`;
    gFlows.append('path')
      .attr('class','flow-arc-hover')
      .attr('d', arcD)
      .attr('stroke', '#ffffff')
      .attr('stroke-width', sw)
      .attr('stroke-opacity', 0)
      .attr('fill', 'none')
      .attr('marker-end', 'url(#arr-hi)')
      .attr('pointer-events', 'none')
      .datum(f)
      .transition().duration(250).ease(d3.easeCubicOut)
      .attr('stroke-opacity', 0.88);
  });

  const c = yd.countries[iso];
  const name = (c && c.n) || nameFromISO[iso] || iso;

  if (c) {
    const netCls = c.net >= 0 ? 'tip-net-pos' : 'tip-net-neg';
    const netSign = c.net >= 0 ? '+' : '';
    tip.innerHTML = `
      <div class="tip-name">${name}</div>
      <div class="tip-row"><span class="tip-label">Exports</span><span class="tip-val" style="color:#d4a144">$${fmtM(c.e)}M</span></div>
      <div class="tip-row"><span class="tip-label">Imports</span><span class="tip-val" style="color:#58a6ff">$${fmtM(c.i)}M</span></div>
      <div class="tip-row"><span class="tip-label">Net</span><span class="tip-val ${netCls}">${netSign}$${fmtM(Math.abs(c.net))}M ${c.net>=0?'exporter':'importer'}</span></div>
    `;
  } else {
    tip.innerHTML = `<div class="tip-name">${name}</div><div style="color:var(--muted);font-size:11px">No data for ${year}</div>`;
  }

  tip.style.display = 'block';
  positionTip(event);
}

function onCountryLeave() {
  // Remove dimming
  gCountries.selectAll('.country').classed('dimmed', false);

  // Remove supplemental hover arcs
  gFlows.selectAll('.flow-arc-hover').remove();

  // Restore top-40 arcs from stored base attributes
  gFlows.selectAll('.flow-arc').each(function(fd) {
    const el = d3.select(this);
    el.attr('stroke', highlighted && fd.ei===highlighted.ei && fd.ii===highlighted.ii ? '#ffffff' : '#d4a144')
      .attr('stroke-opacity', el.attr('data-base-op'))
      .attr('marker-end', el.attr('data-base-marker'));
  });

  hideTip();
}

// ── Flow tooltip ───────────────────────────────────────────────────────────
function showFlowTip(event, d) {
  const uv = (d.q && d.q > 0) ? fmtM(d.v * 1000 / d.q) : null;
  tip.innerHTML = `
    <div class="tip-name">${d.en} → ${d['in']}</div>
    <div class="tip-row"><span class="tip-label">Value</span><span class="tip-val" style="color:#d4a144">$${fmtM(d.v)}M</span></div>
    ${d.q ? `<div class="tip-row"><span class="tip-label">Volume</span><span class="tip-val">${fmtM(d.q)}k t</span></div>` : ''}
    ${uv ? `<div class="tip-row"><span class="tip-label">Unit price</span><span class="tip-val">$${fmtM(uv)}/t</span></div>` : ''}
    <div style="font-size:10px;color:var(--muted);margin-top:4px">Click to isolate this flow</div>
  `;
  tip.style.display = 'block';
  positionTip(event);
}

function hideTip() { tip.style.display = 'none'; }

function positionTip(e) {
  const r = mapWrap.getBoundingClientRect();
  let x = e.clientX - r.left + 14, y = e.clientY - r.top + 14;
  if (x + 240 > r.width)  x = e.clientX - r.left - 240;
  if (y + 160 > r.height) y = e.clientY - r.top - 160;
  tip.style.left = x + 'px'; tip.style.top = y + 'px';
}

svg.on('mousemove', e => { if (tip.style.display === 'block') positionTip(e); });

// ── Panel ──────────────────────────────────────────────────────────────────
function updatePanel(flows) {
  const list = document.getElementById('flow-list');
  const maxV = flows.length ? flows[0].v : 1;
  list.innerHTML = flows.map((f, i) => `
    <li class="flow-item ${highlighted && highlighted.ei===f.ei && highlighted.ii===f.ii ? 'active' : ''}"
        data-i="${i}">
      <div class="flow-route">${f.en} → ${f['in']}</div>
      <div class="flow-bar-row">
        <div class="bar-bg"><div class="bar-fill" style="width:${(f.v/maxV*100).toFixed(1)}%"></div></div>
        <span class="flow-val">$${fmtMShort(f.v)}</span>
      </div>
    </li>
  `).join('');

  list.querySelectorAll('.flow-item').forEach((el, i) => {
    el.addEventListener('click', () => {
      const f = flows[i];
      highlighted = (highlighted && highlighted.ei===f.ei && highlighted.ii===f.ii)
        ? null : { ei: f.ei, ii: f.ii };
      render();
    });
  });
}

// ── Formatting ────────────────────────────────────────────────────────────
function fmtM(v) {
  if (v == null) return '—';
  if (v >= 1000) return (v/1000).toFixed(2) + 'B';
  if (v >= 100)  return v.toFixed(0);
  return v.toFixed(1);
}
function fmtMShort(v) {
  if (v >= 1000) return (v/1000).toFixed(1) + 'B';
  return v.toFixed(0) + 'M';
}

// ── Controls ───────────────────────────────────────────────────────────────
document.getElementById('btn-prev').addEventListener('click', () => { stop(); yi=Math.max(0,yi-1); render(); });
document.getElementById('btn-next').addEventListener('click', () => { stop(); yi=Math.min(years.length-1,yi+1); render(); });
document.getElementById('year-slider').addEventListener('input', e => { stop(); yi=+e.target.value; render(); });
document.getElementById('btn-play').addEventListener('click', toggle);

function toggle() { playing ? stop() : start(); }
function start() {
  playing = true;
  document.getElementById('ico-play').style.display = 'none';
  document.getElementById('ico-pause').style.display = '';
  if (yi >= years.length-1) yi = 0;
  playTimer = setInterval(() => { yi++; if(yi>=years.length) yi=0; render(); }, playSpeed);
}
function stop() {
  playing = false;
  document.getElementById('ico-play').style.display = '';
  document.getElementById('ico-pause').style.display = 'none';
  clearInterval(playTimer);
}

document.querySelectorAll('[data-spd]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-spd]').forEach(b => b.classList.remove('on-amber'));
    btn.classList.add('on-amber');
    playSpeed = +btn.dataset.spd;
    if (playing) { stop(); start(); }
  });
});

document.getElementById('flow-all').addEventListener('click', () => {
  topNFilter = 40;
  document.getElementById('flow-all').classList.add('on-amber');
  document.getElementById('flow-top10').classList.remove('on-amber');
  render();
});
document.getElementById('flow-top10').addEventListener('click', () => {
  topNFilter = 10;
  document.getElementById('flow-top10').classList.add('on-amber');
  document.getElementById('flow-all').classList.remove('on-amber');
  render();
});

document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft')  { stop(); yi=Math.max(0,yi-1); render(); }
  if (e.key==='ArrowRight') { stop(); yi=Math.min(years.length-1,yi+1); render(); }
  if (e.key===' ')          { e.preventDefault(); toggle(); }
  if (e.key==='Escape')     { highlighted=null; gCountries.selectAll('.country').classed('dimmed',false); hideTip(); render(); }
});
</script>
<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
